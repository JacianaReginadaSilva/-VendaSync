<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VendaSync - Gestão de Pedidos Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .product-card:hover { transform: translateY(-4px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <!-- Header -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-emerald-600 p-2 rounded-xl text-white shadow-lg shadow-emerald-100">
                    <i class="fas fa-cart-shopping"></i>
                </div>
                <h1 class="text-xl font-bold text-slate-800">VendaSync</h1>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-sm font-medium text-slate-500 hidden md:block">Sistema de Gestão v1.0</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="grid lg:grid-cols-12 gap-8">
            
            <!-- Coluna Esquerda: Catálogo (Tarefas 2b e 2d) -->
            <div class="lg:col-span-8 space-y-6">
                <div class="flex items-center justify-between">
                    <h2 class="text-2xl font-bold">Catálogo de Produtos</h2>
                    <span id="items-count" class="bg-emerald-100 text-emerald-700 text-xs font-bold px-3 py-1 rounded-full uppercase"></span>
                </div>
                
                <div id="catalog-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Cards de produtos inseridos via JS -->
                </div>
            </div>

            <!-- Coluna Direita: Pedido e Calculadora (Tarefas 2a e 2c) -->
            <div class="lg:col-span-4 space-y-6">
                
                <!-- Calculadora de Pedido -->
                <section class="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <i class="fas fa-receipt text-emerald-500"></i> Resumo do Pedido
                    </h3>
                    
                    <div class="space-y-4">
                        <div class="flex justify-between text-slate-600">
                            <span>Subtotal:</span>
                            <span id="subtotal-val" class="font-bold">R$ 0,00</span>
                        </div>
                        
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Aplicar Desconto (%)</label>
                            <input type="number" id="discount-input" value="0" min="0" max="100"
                                class="w-full px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none transition">
                        </div>

                        <hr class="border-slate-100">
                        
                        <div class="flex justify-between text-xl font-bold text-slate-800">
                            <span>Total:</span>
                            <span id="total-val" class="text-emerald-600">R$ 0,00</span>
                        </div>

                        <button onclick="finalizarPedido()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold hover:bg-emerald-700 shadow-xl shadow-emerald-100 transition-all active:scale-95">
                            Registrar Venda
                        </button>
                    </div>
                </section>

                <!-- Validação de Endereço (Brasil API) -->
                <section class="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <i class="fas fa-truck text-blue-500"></i> Entrega
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">CEP do Cliente</label>
                            <div class="relative">
                                <input type="text" id="cep-input" maxlength="9" placeholder="00000-000"
                                    class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 transition">
                            </div>
                            <p id="cep-msg" class="text-[11px] mt-1 font-semibold hidden"></p>
                        </div>
                        
                        <div id="address-box" class="p-4 bg-slate-50 rounded-2xl border border-slate-100 hidden">
                            <p class="text-xs text-slate-500 uppercase font-bold mb-1">Endereço de Destino:</p>
                            <p id="full-address" class="text-sm text-slate-700 font-medium"></p>
                        </div>
                    </div>
                </section>

            </div>
        </div>
    </main>

    <!-- Toast de Confirmação -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl hidden z-[100] flex items-center gap-3">
        <i class="fas fa-check-circle text-emerald-400"></i>
        <span>Venda registrada com sucesso!</span>
    </div>

    <script>
        // --- 1. Catálogo de Produtos (Tarefa 2b) ---
        const products = [
            { id: 1, name: "Notebook Workstation", price: 4500.00, category: "Eletrônicos", icon: "laptop" },
            { id: 2, name: "Monitor 4K Ultra", price: 1850.00, category: "Eletrônicos", icon: "desktop" },
            { id: 3, name: "Teclado Mecânico RGB", price: 350.00, category: "Periféricos", icon: "keyboard" },
            { id: 4, name: "Mouse Gamer Pro", price: 210.00, category: "Periféricos", icon: "mouse" },
            { id: 5, name: "Cadeira Ergonômica", price: 1200.00, category: "Móveis", icon: "chair" },
            { id: 6, name: "Headset Noise Cancelling", price: 580.00, category: "Áudio", icon: "headphones" }
        ];

        let selectedPrice = 0;

        // --- 2. Renderização do Catálogo (Tarefa 2d) ---
        function renderCatalog() {
            const container = document.getElementById('catalog-container');
            document.getElementById('items-count').textContent = `${products.length} itens`;
            
            container.innerHTML = products.map(product => `
                <div class="product-card bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm flex items-center justify-between transition-all cursor-pointer group"
                     onclick="selectProduct(${product.price}, this)">
                    <div class="flex items-center gap-4">
                        <div class="bg-slate-50 p-4 rounded-2xl group-hover:bg-emerald-50 transition-colors">
                            <i class="fas fa-${product.icon} text-slate-400 group-hover:text-emerald-600"></i>
                        </div>
                        <div>
                            <h4 class="font-bold text-slate-800">${product.name}</h4>
                            <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">${product.category}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="block text-lg font-bold text-slate-800">R$ ${product.price.toFixed(2)}</span>
                        <span class="text-[10px] text-emerald-500 font-bold uppercase">Selecionar</span>
                    </div>
                </div>
            `).join('');
        }

        // --- 3. Calculadora de Descontos (Tarefa 2a) ---
        function selectProduct(price, element) {
            // Estilo visual de seleção
            document.querySelectorAll('.product-card').forEach(c => c.classList.replace('border-emerald-500', 'border-slate-100'));
            element.classList.replace('border-slate-100', 'border-emerald-500');
            
            selectedPrice = price;
            updateTotals();
        }

        const discountInput = document.getElementById('discount-input');
        discountInput.addEventListener('input', updateTotals);

        function updateTotals() {
            const subtotal = selectedPrice;
            const discountPercent = parseFloat(discountInput.value) || 0;
            const discountValue = (subtotal * discountPercent) / 100;
            const total = subtotal - discountValue;

            document.getElementById('subtotal-val').textContent = `R$ ${subtotal.toFixed(2)}`;
            document.getElementById('total-val').textContent = `R$ ${total.toFixed(2)}`;
        }

        // --- 4. Consumo de API Externa de CEP (Tarefa 2c) ---
        const cepInput = document.getElementById('cep-input');
        const cepMsg = document.getElementById('cep-msg');
        const addressBox = document.getElementById('address-box');

        cepInput.addEventListener('input', async (e) => {
            let cep = e.target.value.replace(/\D/g, "");
            if (cep.length === 8) {
                cepMsg.textContent = "Buscando...";
                cepMsg.className = "text-[11px] mt-1 block text-blue-500 font-semibold";
                cepMsg.classList.remove('hidden');

                try {
                    const response = await fetch(`https://brasilapi.com.br/api/cep/v1/${cep}`);
                    const data = await response.json();
                    
                    if (!response.ok) throw new Error();

                    document.getElementById('full-address').textContent = `${data.street || 'Rua não informada'}, ${data.neighborhood || 'Bairro N/A'} - ${data.city}/${data.state}`;
                    addressBox.classList.remove('hidden');
                    cepMsg.textContent = "CEP Válido!";
                    cepMsg.className = "text-[11px] mt-1 block text-emerald-600 font-semibold";
                } catch {
                    cepMsg.textContent = "CEP inválido ou não encontrado.";
                    cepMsg.className = "text-[11px] mt-1 block text-red-500 font-semibold";
                    addressBox.classList.add('hidden');
                }
            } else {
                cepMsg.classList.add('hidden');
                addressBox.classList.add('hidden');
            }
        });

        // Finalização Visual
        function finalizarPedido() {
            if (selectedPrice === 0) {
                alert("Por favor, selecione um produto no catálogo antes de vender!");
                return;
            }
            const toast = document.getElementById('toast');
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        // Inicialização
        document.addEventListener('DOMContentLoaded', renderCatalog);
    </script>
</body>
</html>
